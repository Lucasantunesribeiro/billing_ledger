name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    permissions:
      checks: write
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore

      - name: Format check
        run: dotnet format --verify-no-changes

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Unit Tests
        run: |
          dotnet test tests/BillingLedger.Billing.UnitTests --no-build --configuration Release --logger trx
          dotnet test tests/BillingLedger.Payments.UnitTests --no-build --configuration Release --logger trx
          dotnet test tests/BillingLedger.Ledger.UnitTests   --no-build --configuration Release --logger trx

      - name: Integration Tests
        run: dotnet test tests/BillingLedger.IntegrationTests --no-build --configuration Release --logger trx

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: "**/*.trx"
          reporter: dotnet-trx
