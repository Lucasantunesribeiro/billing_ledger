services:
  postgres:
    image: postgres:16-alpine
    container_name: billing_postgres
    environment:
      POSTGRES_USER: billing_user
      POSTGRES_PASSWORD: billing_pass
      POSTGRES_DB: billing_ledger
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billing_user -d billing_ledger"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: billing_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  localstack:
    image: localstack/localstack:3
    container_name: billing_localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: sns,sqs
      DEBUG: 0
      PERSISTENCE: 1
    volumes:
      - localstack_data:/var/lib/localstack
      - ./scripts/localstack-setup.sh:/etc/localstack/init/ready.d/setup.sh
    healthcheck:
      test: ["CMD-SHELL", "awslocal sns list-topics || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
  localstack_data:
